[start]
command:/usr/local/etc/rc.d/pondsec_ndr onestart
parameters:
type:script
message:PondSec NDR service start

[stop]
command:/usr/local/etc/rc.d/pondsec_ndr onestop
parameters:
type:script
message:PondSec NDR service stop

[restart]
command:/usr/local/etc/rc.d/pondsec_ndr onerestart
parameters:
type:script
message:PondSec NDR service restart

[reload]
command:/usr/local/etc/rc.d/pondsec_ndr onereload
parameters:
type:script
message:PondSec NDR service reload

[status]
command:/usr/local/sbin/pondsec-ndrctl status --json
parameters:
type:script_output
message:PondSec NDR service status

